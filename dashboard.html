<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | FACES 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav id="navbar" class="sticky">
        <a href="index.html" class="brand">FACES 2026</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <a href="register.html" class="btn-primary">Register Now</a>
    </nav>

    <section style="margin-top: 100px;">
        <div class="section-title">
            <h2>Student Dashboard</h2>
            <p>Track your participation status.</p>
        </div>

        <div class="glass" style="max-width: 600px; margin: 0 auto; padding: 2rem; text-align: center;">
            <p style="margin-bottom: 1.5rem;">Enter your registered email to view status.</p>
            <div style="display: flex; gap: 0.5rem;">
                <input type="email" id="dash-email" class="form-control" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 0.8rem; border-radius: 5px; color: white; flex: 1;" placeholder="your@email.com">
                <button id="checkStatus" class="btn-primary">Check</button>
            </div>
        </div>

        <div id="dash-result" style="margin-top: 3rem; max-width: 800px; margin-left: auto; margin-right: auto;"></div>
    </section>

    <script>
        $(document).ready(function(){
            $('#checkStatus').click(function(){
                const email = $('#dash-email').val();
                if(!email) return alert('Please enter email');

                $('#dash-result').html('<p style="text-align:center;">Fetching data...</p>');

                $.ajax({
                    url: 'php/get_status.php',
                    type: 'GET',
                    data: { email: email },
                    success: function(response){
                        $('#dash-result').html(response);
                    }
                });
            });
        });
    </script>

    <!-- Footer -->
    <footer>
        <div class="copyright">
            &copy; 2026 FACES. All Rights Reserved.
        </div>
    </footer>
</body>
</html>
